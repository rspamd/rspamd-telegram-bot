group "telegram" {
    symbols {
        "TELEGRAM_SPAM_USER" { weight = 15.0; description = "Known Telegram spammer"; }
        "TELEGRAM_SPAM_URL" { weight = 10.0; description = "Known spam URL"; }
        "TELEGRAM_FUZZY_DENIED" { weight = 15.0; description = "Fuzzy match with known spam"; }
        "TELEGRAM_NEW_USER_LINK" { weight = 6.0; description = "New user posting URLs"; }
        "TELEGRAM_FORWARD_SPAM" { weight = 4.0; description = "Forward from unknown user with links"; }
        "TELEGRAM_JOIN_FLOOD" { weight = 3.0; description = "Multiple joins in short period"; }
        "TELEGRAM_SUSPICIOUS_NAME" { weight = 4.0; description = "Display name matches spam patterns"; }
        "TELEGRAM_CRYPTO_SPAM" { weight = 10.0; description = "Crypto/investment spam patterns"; }
        "TELEGRAM_SHORT_FIRST_MSG" { weight = 5.0; description = "Short first message with link from new user"; }
        "TELEGRAM_USER_REPUTATION" { weight = -1.0; description = "User reputation based on activity history"; }
    }
}

group "neural" {
    symbols {
        "NEURAL_SPAM" { weight = 10.0; description = "Neural network detected spam"; }
        "NEURAL_HAM" { weight = -5.0; description = "Neural network detected ham"; }
    }
}

group "gpt" {
    symbols {
        "GPT_SPAM" { weight = 12.0; description = "GPT classified as spam"; }
        "GPT_HAM" { weight = -6.0; description = "GPT classified as ham"; }
    }
}

group "chartable" {
    symbols {
        "R_MIXED_CHARSET" { weight = 5.0; description = "Mixed character sets (homoglyph obfuscation)"; }
        "R_MIXED_CHARSET_URL" { weight = 7.0; description = "Mixed character sets in URL"; }
    }
}
