rules {
  NEURAL {
    allowed_settings = "all";

    train {
      learn_mode = "probabilistic";
      learning_rate = 0.001;
      max_usages = 2;
      max_trains = 300;
      max_iterations = 250;
    }

    watch_interval = 30.0;

    # Fasttext embeddings with per-language models
    providers = [
      {
        type = "fasttext_embed";
        language_models = {
          en = "/var/lib/rspamd/fasttext/cc_quant.en.ftz.bin";
          ru = "/var/lib/rspamd/fasttext/cc_quant.ru.ftz.bin";
        };
        weight = 1.0;
        word_form = "norm";
        include_subject = true;
        output_mode = "conv1d";
        max_words = 32;
      }
    ];

    conv1d = {
      max_words = 32;
      n_filters = 32;
      kernel_size = 3;
    };

    activation = "gelu";
    dropout = 0.2;
    use_layernorm = true;

    roc_enabled = false;
    spam_score_threshold = 0.7;
    ham_score_threshold = 0.3;

    fusion {
      normalization = "unit";
      include_meta = true;
      meta_weight = 0.3;
    }
  }
}

allow_local = true;
