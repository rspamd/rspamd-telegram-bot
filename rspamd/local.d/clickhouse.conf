servers = "clickhouse:8123";
database = "telegram_bot";

# Store individual symbol names/scores (required for analytics)
enable_symbols = true;

# Store message subjects
insert_subject = true;

# Store full IPs (no masking needed for Telegram)
ipmask = 0;
ipmask6 = 0;

# Include scans from local sources (rspamc, API)
allow_local = true;
