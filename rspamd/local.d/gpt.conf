enabled = true;
type = "openai";
api_key = "{= env.OPENROUTER_API_KEY =}";
model = "{= env.OPENROUTER_MODEL =}";
url = "https://openrouter.ai/api/v1/chat/completions";

# Only check messages that are not already classified
allow_ham = true;

# Telegram messages are short, lower the threshold
min_words = 3;

# Single model setup: lower consensus thresholds
consensus_spam_threshold = 0.6;
consensus_ham_threshold = 0.4;

# Telegram-specific prompt
prompt = <<EOP
You are an anti-spam classifier for Telegram group chats.

You will receive:
1. The MESSAGE TEXT to classify (the actual content to judge)
2. CHANNEL CONTEXT with recent legitimate messages showing the channel's topics and language

Your job: decide if the MESSAGE TEXT is spam or legitimate.

IMPORTANT:
- The message and channel may be in ANY language (Russian, English, etc.) — do NOT treat non-English as suspicious
- Focus on the MESSAGE CONTENT, not just whether it matches recent topics exactly
- A message can be on-topic even if the exact subject wasn't discussed recently
- New users sharing relevant news, links, or asking questions are LEGITIMATE
- Links to products, articles, or projects are legitimate if they relate to the channel topic
- Sharing personal experience or opinions about on-topic subjects is legitimate

SPAM indicators:
- Crypto/trading schemes, investment offers, job scams
- Drug offers, gambling promotions
- "Write me in DM/PM" lures with vague offers
- Mixed Cyrillic/Latin homoglyphs (obfuscation)
- Completely off-topic advertising or self-promotion
- Generic copy-paste messages unrelated to the channel

HAM indicators:
- Technical discussions, questions, answers
- News, product announcements related to channel topic
- Personal experience sharing
- Greetings with on-topic content
- Links to relevant resources, documentation, products

Respond with:
Line 1: spam probability (0.0 = definitely ham, 1.0 = definitely spam)
Line 2: brief reason
Line 3: category (spam/ham/uncertain)
EOP;

# Condition: skip trusted users, otherwise extract content like default
condition = <<EOC
local lua_mime = require "lua_mime"
local llm_common = require "llm_common"
return function(task)
  if task:has_symbol('TELEGRAM_USER_REPUTATION') then
    return false, 'trusted user'
  end

  local sel_part = lua_mime.get_displayed_text_part(task, 3)
  if not sel_part then
    return false, 'no text part found'
  end

  local input_tbl = llm_common.build_llm_input(task, {
    max_tokens = 1000,
    reply_trim_mode = 'none',
  })
  if not input_tbl then
    return false, 'no content to send'
  end

  return true, input_tbl, sel_part
end
EOC;

# Augment prompt with channel context from Redis
context_augment = <<EOD
  local lua_redis = require "lua_redis"
  local ucl = require "ucl"
  local rspamd_logger = require "rspamd_logger"

  return function(task, content, callback)
    local channel_id = task:get_header('X-Telegram-Chat-Id')
    if not channel_id then
      callback(nil)
      return
    end

    local redis_key = 'tg_channel_ctx:' .. channel_id

    local rp = lua_redis.parse_redis_server('gpt')

    local function redis_cb(err, data)
      if err or not data or type(data) ~= 'string' then
        rspamd_logger.debugm('gpt', task,
          'no channel context for %s', channel_id)
        callback(nil)
        return
      end

      local parser = ucl.parser()
      local ok, parse_err = parser:parse_string(data)
      if not ok then
        rspamd_logger.errx(task,
          'failed to parse channel context: %s', parse_err)
        callback(nil)
        return
      end
      local ctx = parser:get_object()

      local parts = {}
      parts[#parts + 1] = string.format(
        "CHANNEL CONTEXT: This message is from Telegram channel '%s'.",
        ctx.channel_title or channel_id)

      if ctx.channel_description then
        parts[#parts + 1] = "Channel description: "
          .. ctx.channel_description
      end

      if ctx.recent_topics and #ctx.recent_topics > 0 then
        parts[#parts + 1] = "Recent discussion topics: "
          .. table.concat(ctx.recent_topics, ", ")
      end

      if ctx.recent_messages then
        parts[#parts + 1] = "Recent messages in channel:"
        local count = 0
        for _, msg in ipairs(ctx.recent_messages) do
          if count >= 10 then break end
          parts[#parts + 1] = string.format("  %s: %s",
            msg.from or "unknown", msg.text or "")
          count = count + 1
        end
      end

      if ctx.known_spam_patterns and #ctx.known_spam_patterns > 0 then
        parts[#parts + 1] = "Known spam patterns in this channel: "
          .. table.concat(ctx.known_spam_patterns, ", ")
      end

      local username = task:get_header('X-Telegram-Username')
      local first_name = task:get_header('X-Telegram-First-Name') or 'unknown'
      if username then
        parts[#parts + 1] = string.format(
          "Message author: %s (@%s) — new/untrusted user, first message in channel",
          first_name, username)
      else
        parts[#parts + 1] = string.format(
          "Message author: %s — new/untrusted user, first message in channel",
          first_name)
      end

      -- Include the message text in context for visibility
      if content and content.text then
        parts[#parts + 1] = string.format(
          "MESSAGE TEXT: %s", content.text)
      end

      parts[#parts + 1] = "Judge whether this message is relevant "
        .. "to the channel topic or is spam/self-promotion/scam."

      callback(table.concat(parts, "\n"))
    end

    lua_redis.redis_make_request(task,
      rp,
      nil,
      false,
      redis_cb,
      'GET',
      {redis_key}
    )
  end
EOD;
