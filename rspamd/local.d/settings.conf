# Telegram scanning profile: only relevant modules run
telegram {
    id = "telegram";
    apply {
        groups_enabled = ["neural", "rbl", "fuzzy", "regexp", "chartable", "telegram", "gpt"];
        # NEURAL_LEARN has no group (explicit_disable flag) so must be enabled separately
        symbols_enabled = ["NEURAL_LEARN"];
        actions {
            greylist = null;
            "rewrite subject" = null;
        }
    }
}

# Profile-only check (for /checkprofile command)
telegram_profile_check {
    id = "telegram_profile_check";
    apply {
        groups_enabled = ["telegram"];
        symbols_enabled = [
            "TG_NAME_ENCLOSED_ALPHA",
            "TG_NAME_MATH_FONT",
            "TG_NAME_GIBBERISH",
            "TG_NAME_EMOJI_ONLY",
            "TG_NAME_FLAGS",
            "TG_NAME_ZALGO",
            "TG_LASTNAME_ENCLOSED_ALPHA",
            "TG_LASTNAME_MATH_FONT",
            "TG_LASTNAME_GIBBERISH",
            "TG_USERNAME_RANDOM",
            "TG_USERNAME_TRAILING_DIGITS",
            "TG_IS_PREMIUM",
            "TG_PREMIUM_SPAMMER",
            "TG_SPAMMER_PROFILE_STRONG",
            "TG_SPAMMER_PROFILE_GIBBERISH",
            "TG_SPAMMER_PROFILE_RANDOM",
        ];
        actions {
            greylist = null;
            "rewrite subject" = null;
        }
    }
}
