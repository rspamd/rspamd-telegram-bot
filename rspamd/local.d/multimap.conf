TELEGRAM_SPAM_USER {
    type = "header";
    header = "X-Telegram-User-Id";
    map = "/etc/rspamd/maps.d/spam_users.map";
    symbol = "TELEGRAM_SPAM_USER";
    score = 10.0;
    description = "Known Telegram spammer user ID";
}

TELEGRAM_SPAM_URL {
    type = "url";
    map = "/etc/rspamd/maps.d/spam_urls.map";
    symbol = "TELEGRAM_SPAM_URL";
    score = 7.0;
    description = "URL found in spam URL list";
}

TELEGRAM_SA_RULES {
    type = "regexp_rules";
    map = "/etc/rspamd/maps.d/spam_rules.cf";
}
